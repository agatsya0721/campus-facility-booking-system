version: "3.9"

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/campus_facility
      JWT_SECRET: replace-with-strong-secret
      JWT_EXPIRES_IN: 8h
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: campus_facility
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
